name: API Contract Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  openapi_snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./backend

      - name: Check OpenAPI Snapshot Drift
        run: |
          python backend/scripts/check_openapi_snapshot.py \
            --baseline backend/contracts/openapi.snapshot.json \
            --current-out backend/contracts/openapi.current.json

      - name: Upload OpenAPI Current Snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openapi-current-snapshot
          path: backend/contracts/openapi.current.json
