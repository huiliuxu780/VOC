name: MVP Smoke Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  smoke:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Backend Dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -e ./backend

      - name: Install Frontend Dependencies
        shell: pwsh
        working-directory: frontend
        run: npm ci

      - name: Start MVP Services
        shell: pwsh
        run: .\run-mvp.ps1

      - name: Run Smoke Script
        shell: pwsh
        run: .\smoke-mvp.ps1 -MaxWaitSec 45

      - name: Stop MVP Services
        if: always()
        shell: pwsh
        run: .\stop-mvp.ps1

      - name: Upload MVP Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mvp-logs
          path: .mvp-logs
